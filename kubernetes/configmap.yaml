apiVersion: v1
kind: ConfigMap
metadata:
  name: global-pay-config
data:
  spring.datasource.url: "jdbc:postgresql://postgres:5432/globalpay"
  spring.redis.host: "redis"
  spring.redis.port: "6379"
  spring.kafka.bootstrap-servers: "kafka:9092"
  logging.level.com.globalpay: "INFO"
  server.port: "8080"
