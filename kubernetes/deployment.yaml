apiVersion: apps/v1
kind: Deployment
metadata:
  name: global-pay-backend
  labels:
    app: global-pay
spec:
  replicas: 3
  selector:
    matchLabels:
      app: global-pay
  template:
    metadata:
      labels:
        app: global-pay
    spec:
      containers:
      - name: global-pay
        image: jemeson007/global-pay:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: global-pay-config
              key: spring.datasource.url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: global-pay-secrets
              key: db.username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: global-pay-secrets
              key: db.password
        - name: SPRING_REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: global-pay-config
              key: spring.redis.host
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: global-pay-config
              key: spring.kafka.bootstrap-servers
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: global-pay-secrets
              key: jwt.secret
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: global-pay-service
spec:
  selector:
    app: global-pay
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: global-pay-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: global-pay-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
